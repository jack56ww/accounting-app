<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随心记账 - 本地文件版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 16px 24px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .btn-icon {
            width: 40px; height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .user-dropdown { position: relative; }
        .user-btn {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }
        .user-btn:hover { background: var(--border); }
        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            min-width: 150px;
            padding: 8px 0;
            display: none;
            z-index: 100;
            border: 1px solid var(--border);
        }
        .dropdown-menu.open { display: block; }
        .dropdown-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .dropdown-item:hover { background: var(--bg); }
        .dropdown-item.logout:hover { background: #fee2e2; color: var(--danger); }

        /* 概览卡片 */
        .overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
        }
        .card-title { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 8px; }
        .card-value { font-size: 2rem; font-weight: 700; }
        .card-value.income { color: var(--success); }
        .card-value.expense { color: var(--danger); }
        .card-subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }

        /* 预算进度 */
        .budget-card .progress-bar {
            width: 100%;
            height: 12px;
            background: var(--bg);
            border-radius: 6px;
            overflow: hidden;
            margin: 12px 0;
        }
        .progress-fill {
            height: 100%;
            background: var(--success);
            border-radius: 6px;
            transition: width 0.3s;
        }
        .progress-fill.warning { background: var(--warning); }
        .progress-fill.danger { background: var(--danger); }
        .budget-info { display: flex; justify-content: space-between; font-size: 0.875rem; }

        /* 图表区域 */
        .charts {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-container {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
        }
        .chart-title { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
        .chart-wrapper { height: 280px; position: relative; }

        /* 记录列表 */
        .records-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
        }
        .records-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .filter-select {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text);
            font-size: 0.9rem;
        }
        .record-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            gap: 16px;
        }
        .record-item:last-child { border-bottom: none; }
        .record-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .record-info { flex: 1; }
        .record-category { font-weight: 500; }
        .record-meta { font-size: 0.8rem; color: var(--text-secondary); }
        .record-amount { font-weight: 600; font-size: 1.1rem; }
        .record-amount.income { color: var(--success); }
        .record-amount.expense { color: var(--danger); }
        .record-actions { display: flex; gap: 8px; }
        .record-btn {
            width: 36px; height: 36px;
            border: none;
            border-radius: 8px;
            background: var(--bg);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .record-btn:hover { background: var(--border); }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        /* 带内容的弹窗在遮罩层之上 */
        #recordModal, #budgetModal {
            z-index: 1002;
        }
        #overlay {
            z-index: 1001;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 32px;
            width: 90%;
            max-width: 480px;
            box-shadow: var(--shadow-lg);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-title { font-size: 1.25rem; font-weight: 600; }
        .close-btn {
            width: 36px; height: 36px;
            border: none;
            background: var(--bg);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--card-bg);
            color: var(--text);
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .type-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .type-btn.active.expense { border-color: var(--danger); background: #fef2f2; color: var(--danger); }
        .type-btn.active.income { border-color: var(--success); background: #f0fdf4; color: var(--success); }
        .form-actions { display: flex; gap: 12px; margin-top: 24px; }
        .form-actions .btn { flex: 1; justify-content: center; padding: 14px; }

        /* 登录页 */
        .auth-page {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .auth-title {
            text-align: center;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-subtitle { text-align: center; color: #64748b; margin-bottom: 32px; font-size: 0.9rem; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .auth-switch { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #64748b; }
        .auth-switch a { color: var(--primary); text-decoration: none; font-weight: 500; cursor: pointer; }
        .error-msg { color: var(--danger); font-size: 0.875rem; margin-top: 8px; display: none; }
        .error-msg.show { display: block; }
        .data-path-info {
            margin-top: 20px;
            padding: 12px;
            background: #f0fdf4;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #166534;
            text-align: center;
        }
        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 9999;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 768px) {
            .charts { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 16px; }
            .header-actions { width: 100%; justify-content: center; flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div id="authPage" class="auth-page">
        <div class="auth-card">
            <h2 class="auth-title">💰 随心记账</h2>
            <p class="auth-subtitle">本地文件版 · 数据保存在你的电脑上</p>
            
            <!-- 选择数据文件夹 -->
            <div id="folderSelectSection" style="margin-bottom: 24px;">
                <button class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;" onclick="selectDataFolder()">
                    📂 选择数据保存文件夹
                </button>
                <p id="folderTip" style="text-align:center;font-size:0.8rem;color:#64748b;margin-top:8px;">
                    请选择一个文件夹用来保存记账数据（第一次使用新建文件夹，以后选择同一个文件夹）
                </p>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" class="auth-form" style="display:none;">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" id="loginUsername" class="form-input" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码">
                    <div id="loginError" class="error-msg"></div>
                </div>
                <button type="button" id="loginBtn" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;">登录</button>
                <p class="auth-switch">还没有账号？<a id="showRegister">立即注册</a></p>
                <p style="text-align:center;margin-top:12px;"><a href="javascript:void(0)" onclick="resetFolder()" style="font-size:0.8rem;color:#64748b;">重新选择文件夹</a></p>
            </form>

            <!-- 注册表单 -->
            <form id="registerForm" class="auth-form" style="display:none;">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" id="regUsername" class="form-input" placeholder="3-20位，支持字母数字中文">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="regPassword" class="form-input" placeholder="至少6位">
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <input type="password" id="regConfirmPassword" class="form-input" placeholder="再次输入密码">
                    <div id="registerError" class="error-msg"></div>
                </div>
                <button type="button" id="registerBtn" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;">注册</button>
                <p class="auth-switch">已有账号？<a id="showLogin">返回登录</a></p>
                <p style="text-align:center;margin-top:12px;"><a href="javascript:void(0)" onclick="resetFolder()" style="font-size:0.8rem;color:#64748b;">重新选择文件夹</a></p>
            </form>

            <div id="dataPathDisplay" class="data-path-info" style="display:none;"></div>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="appContainer" style="display:none;">
        <div class="container">
            <header class="header">
                <h1>💰 随心记账</h1>
                <div class="header-actions">
                    <button class="btn btn-icon" id="themeToggle" title="切换主题">🌙</button>
                    <button class="btn btn-secondary" id="setBudgetBtn">📊 设置预算</button>
                    <button class="btn btn-secondary" id="exportBtn">💾 导出备份</button>
                    <div class="user-dropdown">
                        <button class="user-btn" id="userInfoBtn">
                            👤 <span id="currentUsername"></span> ▼
                        </button>
                        <div class="dropdown-menu" id="dropdownMenu">
                            <div class="dropdown-item logout" id="logoutBtn">🚪 退出登录</div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="overview">
                <div class="card">
                    <div class="card-title">账户余额</div>
                    <div class="card-value" id="balanceAmount">¥0.00</div>
                    <div class="card-subtitle">累计结余</div>
                </div>
                <div class="card">
                    <div class="card-title">本月收入</div>
                    <div class="card-value income" id="monthIncome">¥0.00</div>
                    <div class="card-subtitle">当月累计</div>
                </div>
                <div class="card">
                    <div class="card-title">本月支出</div>
                    <div class="card-value expense" id="monthExpense">¥0.00</div>
                    <div class="card-subtitle">当月累计</div>
                </div>
                <div class="card budget-card">
                    <div class="card-title">本月预算</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="budgetProgress"></div>
                    </div>
                    <div class="budget-info">
                        <span id="budgetUsed">¥0.00</span>
                        <span id="budgetStatus">点击设置预算</span>
                        <span id="budgetTotal">¥0.00</span>
                    </div>
                </div>
            </div>

            <div class="charts">
                <div class="chart-container">
                    <div class="chart-title">📈 近7天收支趋势</div>
                    <div class="chart-wrapper">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
                <div class="chart-container">
                    <div class="chart-title">🥧 本月支出分类</div>
                    <div class="chart-wrapper">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="records-section">
                <div class="records-header">
                    <h3>📝 记账记录</h3>
                    <div style="display:flex;gap:12px;align-items:center;">
                        <select id="filterType" class="filter-select">
                            <option value="all">全部</option>
                            <option value="expense">支出</option>
                            <option value="income">收入</option>
                        </select>
                        <button class="btn btn-primary" id="addRecordBtn">+ 添加记录</button>
                    </div>
                </div>
                <div id="recordsList"></div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑记录弹窗 -->
    <div class="modal-overlay" id="recordModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">添加记录</h3>
                <button class="close-btn" id="closeModal">✕</button>
            </div>
            <form id="recordForm">
                <div class="type-buttons">
                    <button type="button" class="type-btn expense active" data-type="expense">支出</button>
                    <button type="button" class="type-btn income" data-type="income">收入</button>
                </div>
                <div class="form-group">
                    <label class="form-label">金额</label>
                    <input type="number" id="amount" class="form-input" step="0.01" min="0" placeholder="请输入金额" required>
                </div>
                <div class="form-group">
                    <label class="form-label">分类</label>
                    <select id="category" class="form-select" required></select>
                </div>
                <div class="form-group">
                    <label class="form-label">日期</label>
                    <input type="date" id="date" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">备注（选填）</label>
                    <input type="text" id="note" class="form-input" placeholder="添加备注...">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 设置预算弹窗 -->
    <div class="modal-overlay" id="budgetModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">设置月度预算</h3>
                <button class="close-btn" id="closeBudgetModal">✕</button>
            </div>
            <form id="budgetForm">
                <div class="form-group">
                    <label class="form-label">月度预算金额</label>
                    <input type="number" id="budgetAmount" class="form-input" step="0.01" min="0" placeholder="请输入预算金额">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBudgetBtn">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <input type="file" id="importFile" accept=".json" style="display:none;">
    <div class="modal-overlay" id="overlay"></div>

    <script>
        // 本地文件存储管理
        class LocalFileStorage {
            constructor() {
                this.folderHandle = null;
                this.currentUser = null;
                this.SALT_PREFIX = 'accounting_app_salt_';
            }

            async selectFolder() {
                if (!window.showDirectoryPicker) {
                    alert('你的浏览器不支持本地文件API，请使用Chrome/Edge浏览器');
                    return false;
                }
                try {
                    this.folderHandle = await window.showDirectoryPicker({
                        mode: 'readwrite',
                        startIn: 'documents'
                    });
                    // 确保users.json存在
                    await this.getUsers();
                    return true;
                } catch (e) {
                    console.log('用户取消选择文件夹');
                    return false;
                }
            }

            async readFile(filename) {
                try {
                    const fileHandle = await this.folderHandle.getFileHandle(filename);
                    const file = await fileHandle.getFile();
                    const text = await file.text();
                    return JSON.parse(text);
                } catch (e) {
                    return null;
                }
            }

            async writeFile(filename, data) {
                try {
                    const fileHandle = await this.folderHandle.getFileHandle(filename, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write(JSON.stringify(data, null, 2));
                    await writable.close();
                    return true;
                } catch (e) {
                    console.error('写入文件失败:', e);
                    return false;
                }
            }

            hashPassword(password, salt) {
                return CryptoJS.SHA256(this.SALT_PREFIX + salt + password).toString();
            }

            generateSalt() {
                return CryptoJS.lib.WordArray.random(16).toString();
            }

            async getUsers() {
                let users = await this.readFile('users.json');
                if (!users) {
                    users = {};
                    await this.writeFile('users.json', users);
                }
                return users;
            }

            async saveUsers(users) {
                return await this.writeFile('users.json', users);
            }

            async register(username, password) {
                const users = await this.getUsers();
                
                if (!username || username.length < 3 || username.length > 20) {
                    return { success: false, message: '用户名长度需在3-20位之间' };
                }
                if (!/^[a-zA-Z0-9_\u4e00-\u9fa5]+$/.test(username)) {
                    return { success: false, message: '用户名只能包含字母、数字、下划线和中文' };
                }
                if (!password || password.length < 6) {
                    return { success: false, message: '密码长度至少6位' };
                }
                if (users[username]) {
                    return { success: false, message: '用户名已存在' };
                }

                const salt = this.generateSalt();
                users[username] = {
                    username,
                    passwordHash: this.hashPassword(password, salt),
                    salt,
                    createdAt: new Date().toISOString()
                };

                await this.saveUsers(users);
                await this.saveUserData(username, { records: [], budget: 0, theme: 'light' });
                
                return { success: true, message: '注册成功，数据已保存到本地文件' };
            }

            async login(username, password) {
                const users = await this.getUsers();
                const user = users[username];
                if (!user) return { success: false, message: '用户名或密码错误' };
                if (this.hashPassword(password, user.salt) !== user.passwordHash) {
                    return { success: false, message: '用户名或密码错误' };
                }
                this.currentUser = username;
                localStorage.setItem('accounting_current_user', username);
                localStorage.setItem('accounting_folder_selected', 'true');
                return { success: true };
            }

            logout() {
                this.currentUser = null;
                localStorage.removeItem('accounting_current_user');
            }

            async checkLogin() {
                const savedUser = localStorage.getItem('accounting_current_user');
                if (savedUser && this.folderHandle) {
                    const users = await this.getUsers();
                    if (users[savedUser]) {
                        this.currentUser = savedUser;
                        return true;
                    }
                }
                return false;
            }

            getUserFilename() {
                return `user_${this.currentUser}.json`;
            }

            async loadUserData() {
                let data = await this.readFile(this.getUserFilename());
                if (!data) {
                    data = { records: [], budget: 0, theme: 'light' };
                    await this.saveUserData(this.currentUser, data);
                }
                return data;
            }

            async saveUserData(username, data) {
                const filename = username ? `user_${username}.json` : this.getUserFilename();
                return await this.writeFile(filename, data);
            }
        }

        // 主应用
        class AccountingApp {
            constructor() {
                this.storage = new LocalFileStorage();
                this.records = [];
                this.budget = 0;
                this.currentType = 'expense';
                this.editingId = null;
                this.charts = {};
                this.categories = {
                    expense: [
                        { id: 'food', name: '餐饮', icon: '🍜' },
                        { id: 'transport', name: '交通', icon: '🚗' },
                        { id: 'shopping', name: '购物', icon: '🛒' },
                        { id: 'entertainment', name: '娱乐', icon: '🎮' },
                        { id: 'housing', name: '住房', icon: '🏠' },
                        { id: 'medical', name: '医疗', icon: '💊' },
                        { id: 'education', name: '教育', icon: '📚' },
                        { id: 'communication', name: '通讯', icon: '📱' },
                        { id: 'other_expense', name: '其他', icon: '📦' }
                    ],
                    income: [
                        { id: 'salary', name: '工资', icon: '💰' },
                        { id: 'bonus', name: '奖金', icon: '🎁' },
                        { id: 'investment', name: '投资', icon: '📈' },
                        { id: 'parttime', name: '兼职', icon: '💼' },
                        { id: 'gift', name: '红包', icon: '🧧' },
                        { id: 'refund', name: '退款', icon: '↩️' },
                        { id: 'other_income', name: '其他', icon: '💵' }
                    ]
                };
                this.init();
            }

            async init() {
                const lastFolder = localStorage.getItem('accounting_last_folder');
                if (lastFolder) {
                    document.getElementById('folderTip').innerHTML = `上次使用文件夹：<strong>${lastFolder}</strong><br>请点击按钮选择同一个文件夹继续使用`;
                }
                this.bindAuthEvents();
            }

            resetFolder() {
                document.getElementById('folderSelectSection').style.display = 'block';
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('loginForm').classList.remove('active');
                document.getElementById('registerForm').classList.remove('active');
                document.getElementById('dataPathDisplay').style.display = 'none';
            }

            showToast(msg) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = msg;
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s';
                    setTimeout(() => toast.remove(), 300);
                }, 2000);
            }

            async selectFolder() {
                if (await this.storage.selectFolder()) {
                    // 记住文件夹名称
                    localStorage.setItem('accounting_last_folder', this.storage.folderHandle.name);
                    localStorage.setItem('accounting_folder_selected', 'true');
                    
                    document.getElementById('folderSelectSection').style.display = 'none';
                    document.getElementById('loginForm').style.display = 'block';
                    document.getElementById('loginForm').classList.add('active');
                    document.getElementById('dataPathDisplay').style.display = 'block';
                    document.getElementById('dataPathDisplay').innerHTML = `✅ 已选择文件夹：<strong>${this.storage.folderHandle.name}</strong><br>所有数据将保存为本地JSON文件`;
                    
                    if (await this.storage.checkLogin()) {
                        await this.showApp();
                    }
                }
            }

            async showApp() {
                document.getElementById('authPage').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                document.getElementById('currentUsername').textContent = this.storage.currentUser;
                
                await this.loadData();
                this.bindAppEvents();
                this.updateUI();
                this.setDefaultDate();
                this.renderCategoryOptions();
                this.showToast('💾 数据已从本地文件加载');
            }

            bindAuthEvents() {
                document.getElementById('showRegister').addEventListener('click', () => {
                    document.getElementById('loginForm').classList.remove('active');
                    document.getElementById('registerForm').classList.add('active');
                    this.clearErrors();
                });
                document.getElementById('showLogin').addEventListener('click', () => {
                    document.getElementById('registerForm').classList.remove('active');
                    document.getElementById('loginForm').classList.add('active');
                    this.clearErrors();
                });
                document.getElementById('loginBtn').addEventListener('click', () => this.handleLogin());
                document.getElementById('loginPassword').addEventListener('keypress', e => e.key === 'Enter' && this.handleLogin());
                document.getElementById('registerBtn').addEventListener('click', () => this.handleRegister());
                document.getElementById('regConfirmPassword').addEventListener('keypress', e => e.key === 'Enter' && this.handleRegister());
            }

            clearErrors() {
                document.getElementById('loginError').classList.remove('show');
                document.getElementById('registerError').classList.remove('show');
            }

            showError(id, msg) {
                const el = document.getElementById(id);
                el.textContent = msg;
                el.classList.add('show');
            }

            async handleLogin() {
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                if (!username || !password) return this.showError('loginError', '请输入用户名和密码');
                
                const btn = document.getElementById('loginBtn');
                btn.disabled = true;
                btn.textContent = '登录中...';
                
                const result = await this.storage.login(username, password);
                if (result.success) {
                    await this.showApp();
                } else {
                    this.showError('loginError', result.message);
                }
                btn.disabled = false;
                btn.textContent = '登录';
            }

            async handleRegister() {
                const username = document.getElementById('regUsername').value.trim();
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirmPassword').value;
                
                if (!username || !password || !confirm) return this.showError('registerError', '请填写完整信息');
                if (password !== confirm) return this.showError('registerError', '两次密码不一致');
                
                const btn = document.getElementById('registerBtn');
                btn.disabled = true;
                btn.textContent = '注册中...';
                
                const result = await this.storage.register(username, password);
                if (result.success) {
                    await this.storage.login(username, password);
                    await this.showApp();
                } else {
                    this.showError('registerError', result.message);
                }
                btn.disabled = false;
                btn.textContent = '注册';
            }

            handleLogout() {
                if (confirm('确定退出？数据已自动保存到本地文件。')) {
                    this.storage.logout();
                    ['loginUsername','loginPassword','regUsername','regPassword','regConfirmPassword'].forEach(id => document.getElementById(id).value = '');
                    this.clearErrors();
                    document.getElementById('authPage').style.display = 'flex';
                    document.getElementById('appContainer').style.display = 'none';
                    document.getElementById('folderSelectSection').style.display = 'none';
                    document.getElementById('loginForm').style.display = 'block';
                    document.getElementById('loginForm').classList.add('active');
                    document.getElementById('registerForm').style.display = 'none';
                    document.getElementById('registerForm').classList.remove('active');
                    document.getElementById('dataPathDisplay').style.display = 'block';
                }
            }

            async loadData() {
                const data = await this.storage.loadUserData();
                this.records = data.records || [];
                this.budget = data.budget || 0;
                
                if (data.theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.getElementById('themeToggle').textContent = '☀️';
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    document.getElementById('themeToggle').textContent = '🌙';
                }
            }

            async saveData() {
                const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
                await this.storage.saveUserData(null, {
                    records: this.records,
                    budget: this.budget,
                    theme,
                    updatedAt: new Date().toISOString()
                });
            }

            bindAppEvents() {
                const dropdown = document.getElementById('dropdownMenu');
                document.getElementById('userInfoBtn').addEventListener('click', e => {
                    e.stopPropagation();
                    dropdown.classList.toggle('open');
                });
                document.addEventListener('click', () => dropdown.classList.remove('open'));
                dropdown.addEventListener('click', e => e.stopPropagation());
                document.getElementById('logoutBtn').addEventListener('click', () => {
                    dropdown.classList.remove('open');
                    this.handleLogout();
                });

                document.getElementById('addRecordBtn').addEventListener('click', () => this.openModal());
                document.getElementById('closeModal').addEventListener('click', () => this.closeModal());
                document.getElementById('cancelBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('closeBudgetModal').addEventListener('click', () => this.closeBudgetModal());
                document.getElementById('cancelBudgetBtn').addEventListener('click', () => this.closeBudgetModal());
                document.getElementById('overlay').addEventListener('click', () => {
                    this.closeModal();
                    this.closeBudgetModal();
                });

                document.querySelectorAll('.type-btn').forEach(btn => {
                    btn.addEventListener('click', e => {
                        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentType = e.target.dataset.type;
                        this.renderCategoryOptions();
                    });
                });

                document.getElementById('recordForm').addEventListener('submit', async e => {
                    e.preventDefault();
                    await this.saveRecord();
                });
                document.getElementById('setBudgetBtn').addEventListener('click', () => this.openBudgetModal());
                document.getElementById('budgetForm').addEventListener('submit', async e => {
                    e.preventDefault();
                    await this.saveBudget();
                });
                document.getElementById('filterType').addEventListener('change', () => this.renderRecords());
                document.getElementById('themeToggle').addEventListener('click', () => this.toggleTheme());
                document.getElementById('exportBtn').addEventListener('click', () => this.exportData());
            }

            setDefaultDate() {
                document.getElementById('date').value = new Date().toISOString().split('T')[0];
            }

            renderCategoryOptions() {
                const select = document.getElementById('category');
                select.innerHTML = '<option value="">请选择分类</option>';
                this.categories[this.currentType].forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = `${cat.icon} ${cat.name}`;
                    select.appendChild(option);
                });
            }

            openModal(id = null) {
                this.editingId = id;
                if (id) {
                    const record = this.records.find(r => r.id === id);
                    if (record) {
                        document.getElementById('modalTitle').textContent = '编辑记录';
                        document.getElementById('amount').value = record.amount;
                        document.getElementById('date').value = record.date;
                        document.getElementById('note').value = record.note || '';
                        this.currentType = record.type;
                        document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === record.type));
                        this.renderCategoryOptions();
                        document.getElementById('category').value = record.category;
                    }
                } else {
                    document.getElementById('modalTitle').textContent = '添加记录';
                    document.getElementById('recordForm').reset();
                    this.setDefaultDate();
                    this.currentType = 'expense';
                    document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === 'expense'));
                    this.renderCategoryOptions();
                }
                document.getElementById('recordModal').classList.add('active');
                document.getElementById('overlay').classList.add('active');
            }

            closeModal() {
                document.getElementById('recordModal').classList.remove('active');
                document.getElementById('overlay').classList.remove('active');
                this.editingId = null;
            }

            openBudgetModal() {
                document.getElementById('budgetAmount').value = this.budget || '';
                document.getElementById('budgetModal').classList.add('active');
                document.getElementById('overlay').classList.add('active');
            }

            closeBudgetModal() {
                document.getElementById('budgetModal').classList.remove('active');
                document.getElementById('overlay').classList.remove('active');
            }

            async saveRecord() {
                const amount = parseFloat(document.getElementById('amount').value);
                const category = document.getElementById('category').value;
                const date = document.getElementById('date').value;
                const note = document.getElementById('note').value;
                
                if (!amount || !category || !date) {
                    alert('请填写完整信息');
                    return;
                }

                if (this.editingId) {
                    const idx = this.records.findIndex(r => r.id === this.editingId);
                    if (idx !== -1) {
                        this.records[idx] = { ...this.records[idx], type: this.currentType, amount, category, date, note, updatedAt: new Date().toISOString() };
                    }
                } else {
                    this.records.unshift({ id: Date.now().toString(), type: this.currentType, amount, category, date, note, createdAt: new Date().toISOString() });
                }

                await this.saveData();
                this.closeModal();
                this.updateUI();
                this.showToast('💾 已保存到本地文件');
            }

            async deleteRecord(id) {
                if (confirm('确定删除这条记录？')) {
                    this.records = this.records.filter(r => r.id !== id);
                    await this.saveData();
                    this.updateUI();
                    this.showToast('💾 已保存到本地文件');
                }
            }

            async saveBudget() {
                this.budget = parseFloat(document.getElementById('budgetAmount').value) || 0;
                await this.saveData();
                this.closeBudgetModal();
                this.updateUI();
                this.showToast('💾 预算已保存');
            }

            getCategoryInfo(id, type) {
                return this.categories[type].find(c => c.id === id) || { name: '未知', icon: '❓' };
            }

            getMonthData() {
                const now = new Date();
                const m = now.getMonth(), y = now.getFullYear();
                const records = this.records.filter(r => {
                    const d = new Date(r.date);
                    return d.getMonth() === m && d.getFullYear() === y;
                });
                return {
                    income: records.filter(r => r.type === 'income').reduce((s, r) => s + r.amount, 0),
                    expense: records.filter(r => r.type === 'expense').reduce((s, r) => s + r.amount, 0),
                    records
                };
            }

            getTotalBalance() {
                return this.records.filter(r => r.type === 'income').reduce((s, r) => s + r.amount, 0) 
                     - this.records.filter(r => r.type === 'expense').reduce((s, r) => s + r.amount, 0);
            }

            renderRecords() {
                const container = document.getElementById('recordsList');
                let records = [...this.records];
                const filter = document.getElementById('filterType').value;
                if (filter !== 'all') records = records.filter(r => r.type === filter);
                records.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                if (records.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div style="font-size:4rem;margin-bottom:16px">📝</div>还没有记账记录<br><button class="btn btn-primary" style="margin-top:20px;padding:12px 32px;font-size:1rem" onclick="app.openModal()">+ 点击添加第一笔记录</button><br><small style="color:var(--text-secondary);margin-top:1rem;display:block">💾 所有数据保存为本地JSON文件，可直接备份复制</small></div>';
                    return;
                }

                container.innerHTML = records.map(r => {
                    const cat = this.getCategoryInfo(r.category, r.type);
                    return `<div class="record-item">
                        <div class="record-icon">${cat.icon}</div>
                        <div class="record-info">
                            <div class="record-category">${cat.name}</div>
                            <div class="record-meta">${r.date}${r.note ? ' · ' + r.note : ''}</div>
                        </div>
                        <div class="record-amount ${r.type}">${r.type === 'income' ? '+' : '-'}¥${r.amount.toFixed(2)}</div>
                        <div class="record-actions">
                            <button class="record-btn" onclick="app.openModal('${r.id}')">✏️</button>
                            <button class="record-btn" onclick="app.deleteRecord('${r.id}')">🗑️</button>
                        </div>
                    </div>`;
                }).join('');
            }

            updateBudgetProgress() {
                const { expense } = this.getMonthData();
                document.getElementById('budgetUsed').textContent = `¥${expense.toFixed(2)}`;
                document.getElementById('budgetTotal').textContent = `¥${this.budget.toFixed(2)}`;
                const progress = document.getElementById('budgetProgress');
                const status = document.getElementById('budgetStatus');
                
                if (this.budget > 0) {
                    const pct = Math.min((expense / this.budget) * 100, 100);
                    progress.style.width = `${pct}%`;
                    progress.classList.remove('warning', 'danger');
                    status.classList.remove('warning', 'danger');
                    if (pct >= 100) { progress.classList.add('danger'); status.classList.add('danger'); status.textContent = '已超支！'; }
                    else if (pct >= 80) { progress.classList.add('warning'); status.classList.add('warning'); status.textContent = '即将超支'; }
                    else status.textContent = `剩余 ¥${(this.budget - expense).toFixed(2)}`;
                } else {
                    progress.style.width = '0%';
                    status.textContent = '点击设置预算';
                }
            }

            updateCharts() {
                const ctx1 = document.getElementById('trendChart').getContext('2d');
                const days = [], incomeData = [], expenseData = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    const ds = d.toISOString().split('T')[0];
                    days.push(d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }));
                    const dr = this.records.filter(r => r.date === ds);
                    incomeData.push(dr.filter(r => r.type === 'income').reduce((s, r) => s + r.amount, 0));
                    expenseData.push(dr.filter(r => r.type === 'expense').reduce((s, r) => s + r.amount, 0));
                }
                if (this.charts.trend) this.charts.trend.destroy();
                const dark = document.documentElement.getAttribute('data-theme') === 'dark';
                const tc = dark ? '#94a3b8' : '#64748b';
                this.charts.trend = new Chart(ctx1, {
                    type: 'line',
                    data: { labels: days, datasets: [
                        { label: '收入', data: incomeData, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.4 },
                        { label: '支出', data: expenseData, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.4 }
                    ]},
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: tc } } },
                        scales: {
                            x: { ticks: { color: tc }, grid: { color: dark ? '#334155' : '#e2e8f0' } },
                            y: { ticks: { color: tc }, grid: { color: dark ? '#334155' : '#e2e8f0' } }
                        }
                    }
                });

                const ctx2 = document.getElementById('categoryChart').getContext('2d');
                const { records } = this.getMonthData();
                const stats = {};
                records.filter(r => r.type === 'expense').forEach(r => stats[r.category] = (stats[r.category] || 0) + r.amount);
                const labels = [], data = [];
                const colors = ['#6366f1','#8b5cf6','#ec4899','#ef4444','#f59e0b','#10b981','#06b6d4','#3b82f6','#64748b'];
                Object.entries(stats).forEach(([id, v]) => {
                    labels.push(this.getCategoryInfo(id, 'expense').name);
                    data.push(v);
                });
                if (data.length === 0) { labels.push('暂无支出'); data.push(1); }
                if (this.charts.category) this.charts.category.destroy();
                this.charts.category = new Chart(ctx2, {
                    type: 'doughnut',
                    data: { labels, datasets: [{ data, backgroundColor: colors.slice(0, data.length), borderWidth: 0 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: tc } } } }
                });
            }

            async toggleTheme() {
                const dark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (dark) {
                    document.documentElement.removeAttribute('data-theme');
                    document.getElementById('themeToggle').textContent = '🌙';
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.getElementById('themeToggle').textContent = '☀️';
                }
                await this.saveData();
                this.updateCharts();
                this.showToast('💾 主题设置已保存');
            }

            exportData() {
                const data = { username: this.storage.currentUser, records: this.records, budget: this.budget, exportDate: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${this.storage.currentUser}_记账备份_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                this.showToast('💾 备份文件已下载');
            }

            updateUI() {
                document.getElementById('balanceAmount').textContent = `¥${this.getTotalBalance().toFixed(2)}`;
                const { income, expense } = this.getMonthData();
                document.getElementById('monthIncome').textContent = `¥${income.toFixed(2)}`;
                document.getElementById('monthExpense').textContent = `¥${expense.toFixed(2)}`;
                this.updateBudgetProgress();
                this.renderRecords();
                this.updateCharts();
            }
        }

        let app;
        document.addEventListener('DOMContentLoaded', () => {
            app = new AccountingApp();
        });

        async function selectDataFolder() {
            await app.selectFolder();
        }
        function resetFolder() {
            app.resetFolder();
        }
    </script>
</body>
</html>
